<!doctype html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Truck Dispatcher - Login</title>
    <link rel="shortcut icon" href="./assets/images/logo-icon.png" />
    <link rel="shortcut icon" href="./assets/images/logo-icon.png" />
    <link rel="stylesheet" href="./assets/css/core/libs.min.css" />
    <link rel="stylesheet" href="./assets/css/hope-ui.min.css?v=2.0.0" />
    <link rel="stylesheet" href="./assets/css/dark.min.css" />
    <link rel="stylesheet" href="./assets/css/customizer.min.css" />
    <link rel="stylesheet" href="./assets/css/rtl.min.css" />
    <link rel="stylesheet" href="./assets/css/custom.css" />
    <link rel="stylesheet" href="./assets/css/login.css" />

</head>

<body class="login">
    <!-- loader Start -->
    <div id="loading">
        <div class="loader simple-loader">
            <div class="loader-body"></div>
        </div>
    </div>
    <!-- loader END -->

    <div class="wrapper">
        <!-- login section starts -->
        <section class="login-content">
            <div class="container">
                <div class="login-cnt">
                    <div class="row m-0">
                        <div class="col-md-6 login-left">
                            <div class="col-lg-8 offset-lg-2 text-center mt-5">
                                <div class="logo mb-3 mt-5 pt-5"><img src="assets/images/logo.png" alt="" >
                                </div>
                                <p>Lorem Ipsum is simply dummy text of the printing and typesetting industry. Lorem
                                    Ipsum has been the industry's standard dummy text ever since the 1500s</p>
                            </div>
                        </div>
                        <div class="col-md-6 login-right">
                            <div class="card card-transparent shadow-none d-flex justify-content-center mb-0 auth-card">
                                <div class="card-body">
                                    <h2 class="mb-2 text-center">Login</h2>
                                    <p class="text-center">Login to stay connected.</p>
                                    <form>
                                        <div class="row">
                                            <div class="col-lg-12">
                                                <div class="form-group">
                                                    <!-- <label for="email" class="form-label">Email</label> -->
                                                    <form action="#">
                                                        <div class="form-row">
                                                            <div class="input-data">
                                                                <input type="text" required>
                                                                <label>Email ID</label>
                                                            </div>
                                                            <div class="input-data">
                                                                <input type="text" required>
                                                                <label>LegalPassword </label>
                                                            </div>
                                                        </div>
                                                    </form>
                                                </div>
                                            </div>
                                            <div class="col-lg-12 d-flex justify-content-between">
                                                <div class="form-check mb-3">
                                                    <input type="checkbox" class="form-check-input" id="customCheck1">
                                                    <label class="form-check-label" for="customCheck1">Remember
                                                        Me</label>
                                                </div>
                                                <a href="forgot-password.html">Forgot Password?</a>
                                            </div>
                                        </div>
                                        <div class="d-flex justify-content-center">
                                            <button type="submit" class="btn btn-primary w-100 mt-0 mb-3">Click here to
                                                Login</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
        </section>
        <!-- login section finish -->
    </div> 

    <script src="./assets/js/core/libs.min.js"></script>
    <script src="./assets/js/core/external.min.js"></script>
    <script src="./assets/js/truck-ui.js" defer></script>
</body>

</html>
